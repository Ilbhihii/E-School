<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Espace Professeur - Design</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        .profile-icon {
            width:50px;
            height:50px;
            display:flex;
            align-items:center;
            justify-content:center;
            border-radius:50%;
            /* gradient moderne */
            background:linear-gradient(135deg,#6366f1,#8b5cf6);
            /* effet glass + ombre */
            box-shadow:
            0 8px 20px rgba(99,102,241,0.3),
            inset 0 1px 2px rgba(255,255,255,0.3);
            position:relative;
            overflow:hidden;
            transition:all .35s ease;
        }

        /* icône */
        .profile-icon i {
            font-size:26px;
            color:white;
            transition:all .3s ease;
        }

        /* effet hover */
        .profile-icon:hover {
            transform:translateY(-4px) scale(1.05);
            box-shadow:
            0 15px 35px rgba(99,102,241,0.4);
        }

        /* effet glow animé */
        .profile-icon::after {
            content:"";
            position:absolute;
            width:120%;
            height:120%;
            background:radial-gradient(circle,rgba(255,255,255,0.4),transparent 70%);
            opacity:0;
            transition:0.4s;
        }
        .profile-icon:hover::after {
            opacity:1;
        }

        /* alignement nom + icône */
        .profile-icon + strong {
            display:block;
            margin-top:6px;
            font-size:14px;
            font-weight:600;
            color:#374151;
            text-align:center;
        }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 bg-dark text-white min-vh-100 p-3">

            <h4 class="text-center mb-4">
                👨‍🏫 Prof Panel
            </h4>

            <ul class="nav flex-column">

                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="#dashboard">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>

                <!-- CHAT -->
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="#chat">
                        <i class="bi bi-chat-dots"></i> Questions Étudiants
                    </a>
                </li>

                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="#assignments">
                        <i class="bi bi-file-earmark-text"></i>
                        Devoirs Étudiants
                    </a>
                </li>

                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="#absences">
                        <i class="bi bi-calendar-x"></i>
                        Absences
                    </a>
                </li>

            </ul>

            <!-- LOGOUT -->
            <button class="btn btn-danger w-100 mt-4">
                <i class="bi bi-box-arrow-right"></i> Déconnexion
            </button>

        </div>

        <!-- CONTENT -->
        <div class="col-md-10 p-4">

            <!-- TOPBAR -->
            <div class="d-flex justify-content-between align-items-center mb-4">

                <h4>Espace Professeur</h4>

                <div class="dropdown text-center">

                    <div class="profile-icon dropdown-toggle" data-bs-toggle="dropdown" style="cursor:pointer;">
                        <i class="bi bi-person-circle"></i>
                    </div>

                    <strong>Professeur</strong>

                    <ul class="dropdown-menu dropdown-menu-end mt-2 shadow">

                        <li>
                            <a class="dropdown-item" href="#profile">
                                <i class="bi bi-person"></i> Mon profil
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item" href="#settings">
                                <i class="bi bi-gear"></i> Paramètres
                            </a>
                        </li>

                        <li><hr class="dropdown-divider"></li>

                        <li>
                            <button class="dropdown-item text-danger">
                                <i class="bi bi-box-arrow-right"></i> Déconnexion
                            </button>
                        </li>

                    </ul>

                </div>

            </div>

            <!-- PAGE CONTENT -->
            <div class="bg-white p-4 rounded shadow-sm">
                <h5>Contenu de la page ici</h5>
                <p>Ceci est un exemple de contenu statique pour démontrer le design du layout professeur.</p>
            </div>

        </div>

    </div>
</div>

</body>
</html>
